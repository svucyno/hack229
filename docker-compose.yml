version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - medirush-db:/app/data
    environment:
      - DATABASE_URL=sqlite:///./medirush.db
      - JWT_SECRET=${JWT_SECRET:-medirush-dev-secret}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  patient-app:
    build:
      context: ./patient-app
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  hospital-dashboard:
    build:
      context: ./hospital-dashboard
      dockerfile: Dockerfile
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  medirush-db:
